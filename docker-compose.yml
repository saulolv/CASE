services:
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: vigil, POSTGRES_USER: vigil, POSTGRES_PASSWORD: vigil }
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U vigil -d vigil"], interval: 5s, timeout: 3s, retries: 10 }
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://vigil:vigil@db:5432/vigil
      FRONTEND_ORIGIN: http://localhost:3000
      SESSION_SECRET: local-development-only-change-me
      DEMO_OPERATOR_USERNAME: operator
      DEMO_OPERATOR_PASSWORD: vigil-demo
      DEMO_VIEWER_USERNAME: viewer
      DEMO_VIEWER_PASSWORD: viewer-demo
      AGENT_MODE: demo
      COOKIE_SECURE: "false"
    depends_on: { db: { condition: service_healthy } }
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment: { NEXT_PUBLIC_USE_API_PROXY: "true", BACKEND_INTERNAL_URL: http://backend:8000 }
    depends_on: [backend]
    ports: ["3000:3000"]
